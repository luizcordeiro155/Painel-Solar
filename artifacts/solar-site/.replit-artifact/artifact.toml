kind = "web"
previewPath = "/"
title = "Painel Solar"
version = "1.0.0"
id = "artifacts/solar-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22240

[services.development]
run = "pnpm --filter @workspace/solar-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solar-site", "run", "build" ]
publicDir = "artifacts/solar-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22240"
BASE_PATH = "/"
